  <!-- Bottom stat strip -->
  <g transform="translate(80 540)">
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#DCDCD9" stroke-width="1"/>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="1.2" fill="#8A8A86">
      <text x="0" y="28" text-transform="uppercase">Apps</text>
      <text x="0" y="58" font-family="Onest, system-ui, sans-serif" font-size="28" font-weight="700" fill="#0A0A09" letter-spacing="-0.5">12</text>

      <text x="220" y="28" text-transform="uppercase">Workflows</text>
      <text x="220" y="58" font-family="Onest, system-ui, sans-serif" font-size="28" font-weight="700" fill="#0A0A09" letter-spacing="-0.5">12</text>

      <text x="440" y="28" text-transform="uppercase">Prompt Sets</text>
      <text x="440" y="58" font-family="Onest, system-ui, sans-serif" font-size="28" font-weight="700" fill="#0A0A09" letter-spacing="-0.5">240<tspan font-family="JetBrains Mono, monospace" font-size="16" fill="#4A4A47">+</tspan></text>

      <text x="660" y="28" text-transform="uppercase">Storage</text>
      <text x="660" y="58" font-family="Onest, system-ui, sans-serif" font-size="18" font-weight="600" fill="#0A0A09" letter-spacing="-0.3">Local-first</text>

      <text x="880" y="28" text-transform="uppercase">URL</text>
      <text x="880" y="58" font-family="Onest, system-ui, sans-serif" font-size="18" font-weight="600" fill="#0A0A09" letter-spacing="-0.3">buildbybim.space</text>
