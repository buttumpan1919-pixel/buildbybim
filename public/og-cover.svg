<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">Buildbybim.space — เครื่องมือทำงานสำหรับก่อสร้าง ออกแบบ และ AI Workflow</title>
  <desc id="d">Open Graph cover for Buildbybim.space platform — monochrome brand with B mark and tagline.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
