  <g font-family="IBM Plex Sans Thai, Onest, system-ui, sans-serif" fill="#0A0A09">
    <text x="240" y="280" font-size="64" font-weight="600" letter-spacing="-1.2">รวมเครื่องมือทำงาน</text>
    <text x="240" y="354" font-size="64" font-weight="600" letter-spacing="-1.2">สำหรับก่อสร้าง <tspan font-style="italic" text-decoration="underline">ออกแบบ</tspan></text>
    <text x="240" y="428" font-size="64" font-weight="600" letter-spacing="-1.2">และ AI Workflow</text>
  </g>

  <!-- Lede -->
