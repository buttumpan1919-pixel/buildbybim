    </pattern>
    <radialGradient id="vignette" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#FAFAF9" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A09" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#FAFAF9"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Top meta strip -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#8A8A86" letter-spacing="1.5">
    <text x="80" y="68" font-weight="600" fill="#0A0A09">BUILDBYBIM.SPACE</text>
    <text x="290" y="68">/ v0.4 — BANGKOK, 2026</text>
    <text x="80" y="90">PUBLIC PLATFORM</text>
    <line x1="80" y1="106" x2="1120" y2="106" stroke="#DCDCD9" stroke-width="1"/>
  </g>

  <!-- B mark -->
  <g transform="translate(80 175)">
    <rect width="128" height="128" rx="24" fill="#0A0A09"/>
    <path fill="#FAFAF9" d="M44 28h24c10 0 18 6.4 18 17 0 5.8-2.6 10.2-7 13 6 2.8 10 8.2 10 15.4 0 11-8.4 18.6-20.8 18.6H44V28zm8.8 8.4v20.6h14.8c6.2 0 10.4-4 10.4-10.2 0-6-4.2-10.4-10.4-10.4H52.8zm0 28.8v19.2h16c6.8 0 11.2-3.8 11.2-9.6S75.6 65.2 68.8 65.2H52.8z"/>
    <rect x="64" y="18" width="1.4" height="92" fill="#FAFAF9" opacity="0.16"/>
    <rect x="18" y="64" width="92" height="1.4" fill="#FAFAF9" opacity="0.16"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(240 200)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#4A4A47" font-weight="500">
